global:
  scrape_interval: 15s # 15s는 메모리 변량 측정에 충분함. 더 자주 측정 시, ec2에 scrape 부하로 인해 오염될 수 있음

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ['__SERVICE_EC2_IP__:9100']
        labels:
          instance_role: service

# JVM 메모리 점유율 측정
  - job_name: spring
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['__SERVICE_EC2_IP__:8081']
        labels:
          application: bscene
