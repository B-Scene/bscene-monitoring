# 모니터링 스택 리버스 프록시 - Grafana를 https로 노출
# 서비스 EC2의 nginx와 동일한 구조 (템플릿 마운트 + envsubst SERVER_NAME 치환)
#
# 여기서 프록시하는 건 Grafana(사람이 보는 대시보드)뿐:
# - Loki(3100)는 promtail이 직접 push하므로 nginx를 거치지 않고
#   보안 그룹(서비스 EC2 IP만 허용)으로 접근 제어
# - Prometheus(9090)는 grafana가 내부 네트워크로 조회하므로 노출 자체가 불필요

server {
    listen 80;
    server_name ${SERVER_NAME};

    # letsencrypt 인증서 발급/갱신용 웹루트 챌린지 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ${SERVER_NAME};

    ssl_certificate     /etc/letsencrypt/live/${SERVER_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SERVER_NAME}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Grafana Live(대시보드 실시간 갱신)는 WebSocket을 쓰므로
    # 해당 경로만 Upgrade 헤더를 붙여 프록시
    location /api/live/ {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }
}
